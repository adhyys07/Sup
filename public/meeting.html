<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting - Sup!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            flex-shrink: 0;
            height: 56px;
            background: #1e1e1e;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
            z-index: 10;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        h1 { color: white; font-size: 18px; font-weight: 700; }
        .meeting-code {
            background: #2a2a2a; color: #aaa;
            padding: 4px 10px; border-radius: 4px;
            font-size: 12px; font-family: monospace;
        }
        .copy-btn {
            background: none; border: none; color: #aaa;
            cursor: pointer; padding: 4px 8px; font-size: 12px; transition: color 0.2s;
        }
        .copy-btn:hover { color: white; }
        .header-right { display: flex; gap: 8px; align-items: center; }
        button {
            padding: 8px 14px; border: none; border-radius: 6px;
            cursor: pointer; font-weight: 600; transition: background 0.2s;
        }
        .btn-leave { background: #c62828; color: white; border-radius: 20px; padding: 8px 20px; }
        .btn-leave:hover { background: #b71c1c; }
        .btn-toggle { background: #2a2a2a; color: white; font-size: 13px; border-radius: 20px; }
        .btn-toggle:hover { background: #3a3a3a; }
        .btn-toggle.active { background: #667eea; }

        /* ── Main layout ── */
        .main-content { flex: 1; display: flex; overflow: hidden; min-height: 0; }

        /* ── Video area ── */
        .video-section {
            flex: 1; display: flex; flex-direction: column;
            min-width: 0; background: #111; overflow: hidden;
        }
        .videos-container {
            flex: 1; display: grid; gap: 4px; padding: 6px;
            overflow: hidden; min-height: 0; min-width: 0;
        }

        /* Dynamic grid by participant count */
        .videos-container.p1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .videos-container.p2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
        .videos-container.p3 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .videos-container.p4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .videos-container.p5 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .videos-container.p6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .videos-container.p7 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); }
        .videos-container.p8 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); }
        .videos-container.p9 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); }
        /* 3rd tile spans full width when alone in second row */
        .videos-container.p3 .video-wrapper:last-child { grid-column: span 2; }
        /* 5th tile centred in last row */
        .videos-container.p5 .video-wrapper:last-child { grid-column: 2 / 3; }

        .video-wrapper {
            background: #1c1c1c; border-radius: 10px;
            overflow: hidden; position: relative;
            min-width: 0; min-height: 0;
        }
        .video-wrapper video:not(#localCamPip) { width: 100%; height: 100%; object-fit: contain; display: block; background: #000; }
        #localCamPip {
            position: absolute;
            right: 12px;
            bottom: 44px;
            width: 280px;
            max-width: 45%;
            aspect-ratio: 16 / 9;
            height: auto;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            background: #000;
            z-index: 5;
            transform: scaleX(-1);
            pointer-events: none;
            display: none;
        }
        .video-label {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.55); color: white;
            padding: 4px 10px; border-radius: 20px;
            font-size: 12px; font-weight: 500;
            backdrop-filter: blur(4px); pointer-events: none;
        }
        .camera-off {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
        }
        .camera-off.active { display: flex; }
        .camera-avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 28px;
            font-weight: 700;
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.28);
            backdrop-filter: blur(4px);
            color: #fff;
        }
        .camera-name {
            font-size: 13px;
            color: #fff;
            opacity: 0.95;
        }

        /* ── Chat sidebar ── */
        .chat-section {
            width: 320px; flex-shrink: 0;
            background: #1e1e1e; border-left: 1px solid #2a2a2a;
            display: none; flex-direction: column; overflow: hidden;
        }
        .chat-section.active { display: flex; }
        .chat-header {
            padding: 15px 18px; border-bottom: 1px solid #2a2a2a;
            color: white; font-weight: 600; font-size: 15px; flex-shrink: 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-close {
            background: none; border: none; color: #555;
            cursor: pointer; font-size: 18px; padding: 0; line-height: 1;
        }
        .chat-close:hover { color: white; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 12px 14px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .chat-messages::-webkit-scrollbar { width: 3px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
        .chat-message {
            padding: 9px 12px; border-radius: 8px;
            background: #2a2a2a; color: #ddd; font-size: 13px; word-break: break-word;
        }
        .message-user { font-weight: 600; color: #667eea; margin-bottom: 3px; font-size: 12px; }
        .message-time { font-size: 10px; color: #555; margin-top: 3px; }
        .chat-input {
            padding: 10px 14px; border-top: 1px solid #2a2a2a;
            display: flex; gap: 8px; flex-shrink: 0;
            align-items: center;
        }
        .chat-input input {
            flex: 1; padding: 8px 12px; border: 1px solid #3a3a3a;
            border-radius: 20px; background: #2a2a2a; color: white; font-size: 13px; outline: none;
        }
        .chat-input input:focus { border-color: #667eea; }
        .chat-input button {
            background: #667eea; color: white; border-radius: 20px; padding: 8px 14px; font-size: 13px;
        }
        .chat-input button:hover { background: #5568d3; }
        .attachment-btn {
            background: #2a2a2a !important;
            color: white;
            min-width: 42px;
            padding: 8px 10px !important;
        }
        .message-attachment {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            margin-top: 2px;
        }
        .message-attachment:hover {
            text-decoration: underline;
        }
        .attachment-meta {
            color: #aaa;
            font-size: 11px;
            margin-top: 4px;
        }

        /* ── Call controls bar ── */
                /* ── Host controls overlay ── */
                .host-controls {
                    position: absolute; top: 8px; right: 8px;
                    display: flex; gap: 4px;
                    opacity: 0; transition: opacity 0.2s; z-index: 10;
                }
                .video-wrapper:hover .host-controls { opacity: 1; }
                .host-btn {
                    background: rgba(0,0,0,0.65); border: none; color: white;
                    width: 28px; height: 28px; border-radius: 50%;
                    cursor: pointer; font-size: 12px; display: flex;
                    align-items: center; justify-content: center;
                    padding: 0; transition: background 0.2s;
                }
                .host-btn:hover { background: rgba(198,40,40,0.85); }
                .host-btn.banned { background: rgba(198,40,40,0.7); }

                /* ── Call controls bar ── */
        .call-controls {
            flex-shrink: 0; height: 68px;
            display: flex; justify-content: center; align-items: center; gap: 14px;
            background: #1e1e1e; border-top: 1px solid #2a2a2a;
        }
        .call-controls button {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: background 0.2s, transform 0.1s;
        }
        .call-controls button:active { transform: scale(0.92); }
        .ctrl-on { background: #2a2a2a !important; color: white; }
        .ctrl-off { background: #c62828 !important; color: white; }

        /* ── Lobby ── */
        .lobby-overlay {
            position: fixed; inset: 0; background: #111; z-index: 200;
            display: flex; align-items: center; justify-content: center;
        }
        .lobby-overlay.hidden { display: none; }
        .lobby-card {
            background: #1e1e1e; border-radius: 20px; padding: 32px;
            width: 500px; max-width: 95vw;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.6);
        }
        .lobby-card h2 { color: white; font-size: 22px; font-weight: 700; }
        .lobby-preview {
            width: 100%; aspect-ratio: 16/9;
            background: #111; border-radius: 14px; overflow: hidden; position: relative;
        }
        .lobby-preview video { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); background: #000; }
        .lobby-preview .cam-off-placeholder {
            position: absolute; inset: 0; display: flex;
            align-items: center; justify-content: center; color: #444; font-size: 48px;
        }
        .lobby-preview .cam-off-placeholder.hidden { display: none; }
        .lobby-controls { display: flex; gap: 16px; }
        .lobby-controls button {
            width: 52px; height: 52px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: background 0.2s, transform 0.1s;
        }
        .lobby-controls button:active { transform: scale(0.92); }
        .lobby-controls .ctrl-on { background: #2a2a2a; color: white; }
        .lobby-controls .ctrl-off { background: #c62828; color: white; }
        .lobby-info { color: #888; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .lobby-info .dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
        .btn-join-now {
            background: #667eea; color: white; font-size: 16px;
            padding: 14px 52px; border-radius: 30px; border: none;
            cursor: pointer; font-weight: 600; transition: background 0.2s, transform 0.1s;
        }
        .btn-join-now:hover { background: #5568d3; }
        .btn-join-now:active { transform: scale(0.97); }
        .btn-back {
            background: none; border: 1px solid #3a3a3a; color: #888;
            padding: 8px 22px; border-radius: 20px; cursor: pointer; font-size: 13px;
        }
        .btn-back:hover { border-color: #666; color: #ccc; }

        @media (max-width: 640px) {
            .chat-section { width: 100%; position: absolute; bottom: 68px; top: 56px; z-index: 5; }
            .videos-container.p2 { grid-template-columns: 1fr; grid-template-rows: repeat(2, 1fr); }
            .videos-container.p3 .video-wrapper:last-child { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <!-- Pre-join Lobby -->
    <div class="lobby-overlay" id="lobbyOverlay">
        <div class="lobby-card">
            <h2>Ready to join?</h2>
            <div class="lobby-preview">
                <video id="lobbyVideo" autoplay muted playsinline></video>
                <div class="cam-off-placeholder hidden" id="camOffPlaceholder">📷</div>
            </div>
            <div class="lobby-controls">
                <button id="lobbyMicBtn" class="ctrl-on" onclick="toggleLobbyMic()" title="Toggle microphone">🎤</button>
                <button id="lobbyCamBtn" class="ctrl-on" onclick="toggleLobbyCam()" title="Toggle camera">📷</button>
            </div>
            <div class="lobby-info" id="lobbyInfo">
                <span class="dot"></span>
                <span id="lobbyParticipantText">Checking room...</span>
            </div>
            <button class="btn-join-now" onclick="joinCall()">Join now</button>
            <button class="btn-back" onclick="window.location.href='/dashboard.html'">Back to dashboard</button>
        </div>
    </div>

    <div class="header">
        <div class="header-left">
            <h1>Sup! Meeting</h1>
            <div class="meeting-code" id="meetingCode"></div>
            <button class="copy-btn" onclick="copyMeetingCode()">Copy</button>
        </div>
        <div class="header-right">
            <button class="btn-toggle" onclick="toggleChat()">Chat</button>
            <button class="btn-leave" onclick="leaveMeeting()">Leave</button>
        </div>
    </div>

    <div class="main-content">
        <div class="video-section">
            <div class="videos-container" id="videosContainer">
                <div class="video-wrapper" id="tile-local">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <video id="localCamPip" autoplay muted playsinline></video>
                    <div class="video-label" id="localVideoLabel">You</div>
                </div>
            </div>
        </div>

        <div class="chat-section" id="chatSection">
            <div class="chat-header">
                Chat
                <span id="e2eeIndicator" style="font-size:10px;opacity:0.65;margin-left:6px;color:#4ade80"></span>
                <button class="chat-close" onclick="toggleChat()" title="Close chat">✕</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <input type="file" id="chatFileInput" hidden onchange="handleAttachmentSelected(event)">
                <button class="attachment-btn" onclick="openAttachmentPicker()" title="Attach file">📎</button>
                <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="handleChatKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- In-call controls -->
    <div class="call-controls" id="callControls">
        <button id="callMicBtn" class="ctrl-on" onclick="toggleCallMic()" title="Toggle microphone">🎤</button>
        <button id="callCamBtn" class="ctrl-on" onclick="toggleCallCam()" title="Toggle camera">📷</button>
        <button id="lockChatBtn" class="ctrl-on" onclick="toggleRoomChat()" title="Lock chat" style="display:none">🔒</button>
        <button id="presentbtn" class="ctrl-on" onclick="togglePresent()" title="Toggle presentation">📽️</button>
        <button id="leaveBtn" class="ctrl-on" onclick="leaveMeeting()" title="Leave meeting">🚪</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const room = params.get('room') || 'unknown-room';
        
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        }

        document.getElementById('meetingCode').textContent = room;

        const socket = io();
        let localStream;
        let peerConnections = {};
        let userNames = {};
        let remoteCameraOff = {};
        let micEnabled = true;
        let camEnabled = true;
        let currentUser = null;

        let meetingInfo = null;
        let isHost = false;
        let chatBanned = false;
        let roomChatLocked = false;
        const participantChatBanned = {};

        // E2EE state
        let e2eeRoomKey = null;
        let e2eeKeyPair = null;
        let e2eeChatLoaded = false;

        const localVideo = document.getElementById('localVideo');
        const localCamPip = document.getElementById('localCamPip');
        const videosContainer = document.getElementById('videosContainer');
        const chatMessages = document.getElementById('chatMessages');
        const chatFileInput = document.getElementById('chatFileInput');

        // Fetch current user info
        async function getCurrentUser() {
            const response = await fetch('/api/user/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            return await response.json();
        }

        function getInitials(name) {
            return (name || 'User')
                .split(' ')
                .filter(Boolean)
                .map(part => part[0])
                .join('')
                .slice(0, 2)
                .toUpperCase();
        }

        function themeFromName(name) {
            const themes = [
                ['#0f2027', '#2c5364'],
                ['#42275a', '#734b6d'],
                ['#134e5e', '#71b280'],
                ['#1f4037', '#99f2c8'],
                ['#373b44', '#4286f4']
            ];
            let hash = 0;
            const value = name || 'User';
            for (let i = 0; i < value.length; i++) hash += value.charCodeAt(i);
            return themes[hash % themes.length];
        }

        // ============ E2EE CRYPTO ============
        function bufToB64(buf) {
            return btoa(String.fromCharCode(...new Uint8Array(buf)));
        }

        function b64ToBuf(b64) {
            return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        }

        async function e2eeInit() {
            e2eeKeyPair = await crypto.subtle.generateKey(
                { name: 'ECDH', namedCurve: 'P-256' },
                true,
                ['deriveKey']
            );
        }

        async function e2eeExportPublicKey() {
            return await crypto.subtle.exportKey('jwk', e2eeKeyPair.publicKey);
        }

        async function e2eeImportPublicKey(jwk) {
            return await crypto.subtle.importKey(
                'jwk', jwk,
                { name: 'ECDH', namedCurve: 'P-256' },
                true, []
            );
        }

        async function e2eeDeriveSharedKey(peerPublicKey) {
            return await crypto.subtle.deriveKey(
                { name: 'ECDH', public: peerPublicKey },
                e2eeKeyPair.privateKey,
                { name: 'AES-GCM', length: 256 },
                false,
                ['wrapKey', 'unwrapKey']
            );
        }

        async function e2eeGenerateRoomKey() {
            return await crypto.subtle.generateKey(
                { name: 'AES-GCM', length: 256 },
                true,
                ['encrypt', 'decrypt']
            );
        }

        async function e2eeWrapRoomKey(roomKey, sharedKey) {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const wrapped = await crypto.subtle.wrapKey('raw', roomKey, sharedKey, { name: 'AES-GCM', iv });
            return { wrappedKey: bufToB64(wrapped), iv: bufToB64(iv) };
        }

        async function e2eeUnwrapRoomKey(wrappedKeyB64, ivB64, sharedKey) {
            const wrappedKey = b64ToBuf(wrappedKeyB64);
            const iv = b64ToBuf(ivB64);
            return await crypto.subtle.unwrapKey(
                'raw', wrappedKey, sharedKey,
                { name: 'AES-GCM', iv },
                { name: 'AES-GCM', length: 256 },
                false, ['encrypt', 'decrypt']
            );
        }

        async function e2eeEncryptText(text) {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const ct = await crypto.subtle.encrypt(
                { name: 'AES-GCM', iv },
                e2eeRoomKey,
                new TextEncoder().encode(text)
            );
            return JSON.stringify({ e2ee: 1, iv: bufToB64(iv), ct: bufToB64(new Uint8Array(ct)) });
        }

        async function e2eeDecryptText(data) {
            if (!e2eeRoomKey || !data) return data;
            try {
                const parsed = JSON.parse(data);
                if (!parsed.e2ee) return data;
                const pt = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: b64ToBuf(parsed.iv) },
                    e2eeRoomKey,
                    b64ToBuf(parsed.ct)
                );
                return new TextDecoder().decode(pt);
            } catch {
                return '🔒 [Encrypted — from a different session]';
            }
        }

        async function decryptIncomingMessage(entry) {
            if (!entry || typeof entry !== 'object') return entry;

            const next = { ...entry };

            if (next.kind === 'text' && next.message) {
                next.message = await e2eeDecryptText(next.message);
            }

            if (next.kind === 'attachment' && next.attachment?.originalNameEncrypted) {
                next.attachment = { ...next.attachment };
                next.attachment.originalName = await e2eeDecryptText(next.attachment.originalName);
            }

            return next;
        }

        async function e2eeEncryptFile(arrayBuffer) {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, e2eeRoomKey, arrayBuffer);
            const combined = new Uint8Array(12 + ct.byteLength);
            combined.set(iv, 0);
            combined.set(new Uint8Array(ct), 12);
            return combined.buffer;
        }

        async function e2eeDecryptFile(arrayBuffer) {
            const bytes = new Uint8Array(arrayBuffer);
            const iv = bytes.slice(0, 12);
            const ct = bytes.slice(12);
            return await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, e2eeRoomKey, ct);
        }

        function e2eeMarkReady() {
            document.getElementById('e2eeIndicator').textContent = '🔒 End-to-end encrypted';
            setChatAvailability();
            if (!e2eeChatLoaded) {
                e2eeChatLoaded = true;
                loadChatMessages().catch(e => console.error('Error loading messages:', e));
            }
        }
        // ============ END E2EE ============

        function setChatAvailability() {
            const input = document.getElementById('chatInput');
            const sendBtn = document.querySelector('.chat-input button:last-of-type');
            const attachmentBtn = document.querySelector('.attachment-btn');
            const disabled = !e2eeRoomKey || chatBanned || (roomChatLocked && !isHost);

            input.disabled = disabled;
            sendBtn.disabled = disabled;
            attachmentBtn.disabled = disabled;

            if (!e2eeRoomKey) {
                input.placeholder = 'Establishing secure channel...';
            } else if (chatBanned) {
                input.placeholder = 'Chat disabled by host';
            } else if (roomChatLocked) {
                input.placeholder = isHost ? 'Chat locked for participants' : 'Chat is locked by host';
            } else {
                input.placeholder = 'Type a message...';
            }
        }

        function toggleRoomChat(){
            const action = roomChatLocked ? 'unlock-chat' : 'lock-chat';
            socket.emit('host-room-control', { room, action });
            roomChatLocked = !roomChatLocked;
            setChatAvailability();
            const btn = document.getElementById('lockChatBtn');
            if (btn){
                btn.textContent = roomChatLocked ? '🔓' : '🔒';
                btn.title = roomChatLocked ? 'Unlock chat for all' : 'Lock chat for all';
                btn.classList.toggle('ctrl-off',roomChatLocked)
                btn.classList.toggle('ctrl-on',!roomChatLocked)
            }
        }

        socket.on('host-room-control',({action,byName})=>{
            const by = byName || 'Host';
            if (action === 'lock-chat'){
                roomChatLocked = true;
                setChatAvailability();
                showHostNotification(`${by} locked the chat for everyone!`);
            } else if (action === 'unlock-chat'){
                roomChatLocked = false;
                setChatAvailability();
                showHostNotification(`${by} unlocked the chat for everyone!`);
            }
        })

        // E2EE: host receives a peer's public key and sends back the wrapped room key
        socket.on('e2ee-public-key', async ({ from, pubKey: peerPubJwk }) => {
            if (!isHost || !e2eeRoomKey) return;
            try {
                const peerPubKey = await e2eeImportPublicKey(peerPubJwk);
                const sharedKey = await e2eeDeriveSharedKey(peerPubKey);
                const { wrappedKey, iv } = await e2eeWrapRoomKey(e2eeRoomKey, sharedKey);
                const myPubKey = await e2eeExportPublicKey();
                socket.emit('e2ee-key-offer', { to: from, wrappedKey, iv, hostPubKey: myPubKey });
            } catch (err) {
                console.error('E2EE: failed to issue key offer:', err);
            }
        });

        // E2EE: participant receives the wrapped room key from host
        socket.on('e2ee-key-offer', async ({ wrappedKey, iv, hostPubKey: hostPubJwk }) => {
            if (e2eeRoomKey) return;
            try {
                const hostPubKey = await e2eeImportPublicKey(hostPubJwk);
                const sharedKey = await e2eeDeriveSharedKey(hostPubKey);
                e2eeRoomKey = await e2eeUnwrapRoomKey(wrappedKey, iv, sharedKey);
                e2eeMarkReady();
                console.log('E2EE: secure channel established');
            } catch (err) {
                console.error('E2EE: failed to unwrap room key:', err);
            }
        });

        function setTileCameraState(tileId, userName, isOff) {
            const wrapper = document.getElementById(tileId);
            if (!wrapper) return;

            const video = wrapper.querySelector('video');
            let placeholder = wrapper.querySelector('.camera-off');

            if (!placeholder) {
                placeholder = document.createElement('div');
                placeholder.className = 'camera-off';
                placeholder.innerHTML = `
                    <div class="camera-avatar"></div>
                    <div class="camera-name"></div>
                `;
                wrapper.appendChild(placeholder);
            }

            const [startColor, endColor] = themeFromName(userName);
            placeholder.style.background = `linear-gradient(135deg, ${startColor}, ${endColor})`;
            placeholder.querySelector('.camera-avatar').textContent = getInitials(userName);
            placeholder.querySelector('.camera-name').textContent = userName || 'User';
            placeholder.classList.toggle('active', !!isOff);

            if (video) {
                video.style.visibility = isOff ? 'hidden' : 'visible';
            }
        }

        // ============ LOBBY ============
        async function initLobby() {
            try {
                currentUser = await getCurrentUser();
                userNames['local'] = currentUser.name;

                // Get camera preview for lobby
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localStream = stream;
                document.getElementById('lobbyVideo').srcObject = stream;

                // Check how many people are in the room
                try {
                    const res = await fetch(`/api/rooms/${room}/participants`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    const text = data.count === 0
                        ? 'No one else is here yet'
                        : `${data.count} person${data.count > 1 ? 's' : ''} in this meeting`;
                    document.getElementById('lobbyParticipantText').textContent = text;
                } catch {
                    document.getElementById('lobbyParticipantText').textContent = 'Ready to connect';
                }
            } catch (error) {
                console.error('Lobby init error:', error);
                document.getElementById('lobbyParticipantText').textContent = 'Camera / mic unavailable';
            }
        }

        function toggleLobbyMic() {
            if (!localStream) return;
            micEnabled = !micEnabled;
            localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
            const btn = document.getElementById('lobbyMicBtn');
            btn.className = micEnabled ? 'ctrl-on' : 'ctrl-off';
            btn.textContent = micEnabled ? '🎤' : '🔇';
        }

        function toggleLobbyCam() {
            if (!localStream) return;
            camEnabled = !camEnabled;
            localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
            const btn = document.getElementById('lobbyCamBtn');
            btn.className = camEnabled ? 'ctrl-on' : 'ctrl-off';
            btn.textContent = camEnabled ? '📷' : '🚫';

            document.getElementById('lobbyVideo').style.display = camEnabled ? '' : 'none';
            document.getElementById('camOffPlaceholder').classList.toggle('hidden', camEnabled);
        }

        // ============ JOIN CALL ============
        async function joinCall() {
            // Hide lobby, show meeting
            document.getElementById('lobbyOverlay').classList.add('hidden');

            // Sync in-call buttons with lobby state
            syncCallControls();

            try {
                // Register join in DB (works for scheduled meetings, ignored for disposable)
                try {
                    await fetch(`/api/meetings/${room}/join`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                } catch (e) { /* disposable meeting — no DB record */ }

                // Assign stream to local video
                localVideo.srcObject = localStream;
                syncLocalCamPip();

                // Update local video label with real name
                document.getElementById('localVideoLabel').textContent = currentUser.name + ' (You)';
                setTileCameraState('tile-local', currentUser.name + ' (You)', !camEnabled);

                // Join socket room
                socket.emit('join-room', room, currentUser.id, currentUser.name, async ({ isHost: hostFlag } = {}) => {
                    isHost = !!hostFlag;
                    if (hostFlag) {
                        document.getElementById('lockChatBtn').style.display = '';
                    }
                    // Initialize E2EE key pair
                    await e2eeInit();
                    if (isHost) {
                        // Host generates the session room key immediately
                        e2eeRoomKey = await e2eeGenerateRoomKey();
                        e2eeMarkReady();
                    }
                    // Broadcast our public key so the host can send us the room key
                    const myPubKey = await e2eeExportPublicKey();
                    socket.emit('e2ee-public-key', { room, pubKey: myPubKey });
                    // Retry if no key offer arrives within 3 s (handles timing race)
                    if (!isHost) {
                        setTimeout(() => {
                            if (!e2eeRoomKey) socket.emit('e2ee-public-key', { room, pubKey: myPubKey });
                        }, 3000);
                    }
                });
                socket.emit('camera-state', { room, isOff: !camEnabled });

                // Set initial grid layout (just local video = p1)
                updateGrid();
                // Chat messages are loaded once E2EE key is established (see e2eeMarkReady)
            } catch (error) {
                console.error('Error joining call:', error);
            }
        }

        // ============ IN-CALL CONTROLS ============
        function syncCallControls() {
            const micBtn = document.getElementById('callMicBtn');
            const camBtn = document.getElementById('callCamBtn');
            micBtn.className = micEnabled ? 'ctrl-on' : 'ctrl-off';
            micBtn.textContent = micEnabled ? '🎤' : '🔇';
            camBtn.className = camEnabled ? 'ctrl-on' : 'ctrl-off';
            camBtn.textContent = camEnabled ? '📷' : '🚫';
        }

        function toggleCallMic() {
            if (!localStream) return;
            micEnabled = !micEnabled;
            localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
            syncCallControls();
        }

        function toggleCallCam() {
            if (!localStream) return;
            camEnabled = !camEnabled;
            localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
            const showCameraOff = isPresenting ? false : !camEnabled;
            setTileCameraState('tile-local', (currentUser?.name || 'You') + ' (You)', showCameraOff);
            if (currentUser && !isPresenting) {
                socket.emit('camera-state', { room, isOff: !camEnabled });
            }
            syncLocalCamPip();
            syncCallControls();
        }

        let isPresenting = false;
        let screenStream = null;

        function syncPresentButton() {
            const btn = document.getElementById('presentbtn');
            if (!btn) return;
            btn.classList.toggle('ctrl-off', isPresenting);
            btn.classList.toggle('ctrl-on', !isPresenting);
            btn.textContent = isPresenting ? '🛑' : '📽️';
            btn.title = isPresenting ? 'Stop presenting' : 'Present screen';
        }

        function replaceVideoTrack(newTrack) {
            Object.values(peerConnections).forEach(pc => {
                const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
                if (sender) sender.replaceTrack(newTrack);
            });
        }

        function syncLocalCamPip() {
            if (!localCamPip) return;
            const shouldShow = isPresenting && camEnabled && !!localStream?.getVideoTracks()?.length;
            localCamPip.style.display = shouldShow ? 'block' : 'none';
            if (shouldShow) {
                if (localCamPip.srcObject !== localStream) {
                    localCamPip.srcObject = localStream;
                }
                localCamPip.play().catch(() => {});
            } else {
                localCamPip.srcObject = null;
            }
        }

        async function startPresent() {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
                const screenTrack = screenStream.getVideoTracks()[0];
                if (!screenTrack) return;
                replaceVideoTrack(screenTrack);

                // Show shared screen in main local view and camera as PiP.
                localVideo.srcObject = screenStream;
                setTileCameraState('tile-local', (currentUser?.name || 'You') + ' (You)', false);

                isPresenting = true;
                syncPresentButton();
                syncLocalCamPip();
                screenTrack.onended = () => stopPresent();
            } catch (err) {
                console.error('Error starting presentation:', err);
            }
        }

        function stopPresent() {
            if (!isPresenting) return;
            if (screenStream) {
                screenStream.getTracks().forEach(t => t.stop());
                screenStream = null;
            }
            const camTrack = localStream?.getVideoTracks()?.[0];
            if (camTrack) replaceVideoTrack(camTrack);
            localVideo.srcObject = localStream;
            setTileCameraState('tile-local', (currentUser?.name || 'You') + ' (You)', !camEnabled);
            isPresenting = false;
            syncPresentButton();
            syncLocalCamPip();
        
        }
        async function togglePresent() {
            if (isPresenting) {
                stopPresent();
            } else {
                await startPresent();
            }
        }


        // ============ WEBRTC ============
        socket.on("user-joined", async (id, name) => {
            console.log("User joined:", id, name);
            if (name) userNames[id] = name;
            const pc = createPeerConnection(id);
            peerConnections[id] = pc;
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            socket.emit("signal", {
                to: id,
                signal: offer
            });
        });

        socket.on("signal", async (data) => {
            let pc = peerConnections[data.from];
            
            if (!pc) {
                pc = createPeerConnection(data.from);
                peerConnections[data.from] = pc;
            }
            
            if (data.signal.type === 'offer') {
                await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                socket.emit("signal", {
                    to: data.from,
                    signal: answer
                });
            } else if (data.signal.type === 'answer') {
                await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
            } else if (data.signal.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
            }
        });

        socket.on("user-left", (id) => {
            if (peerConnections[id]) {
                peerConnections[id].close();
                delete peerConnections[id];
            }
            delete remoteCameraOff[id];
            delete participantChatBanned[id];
            const videoElement = document.getElementById(`video-${id}`);
            if (videoElement) {
                videoElement.parentElement.remove();
            }
            updateGrid();
        });

        socket.on("receive-message", async (data) => {
            const decrypted = await decryptIncomingMessage(data);
            addMessageToChat(decrypted);
        });

        socket.on('camera-state', ({ from, isOff }) => {
            remoteCameraOff[from] = !!isOff;
            setTileCameraState(`tile-${from}`, userNames[from] || 'Remote User', !!isOff);
        });

        socket.on('host-control', ({ action, byName }) => {
            const by = byName || 'Host';
            if (action === 'mute-audio') {
                micEnabled = false;
                localStream?.getAudioTracks().forEach(t => t.enabled = false);
                syncCallControls();
                showHostNotification(`${by} muted your microphone`);
            } else if (action === 'mute-video') {
                if (isPresenting) stopPresent();
                camEnabled = false;
                localStream?.getVideoTracks().forEach(t => t.enabled = false);
                setTileCameraState('tile-local', (currentUser?.name || 'You') + ' (You)', true);
                socket.emit('camera-state', { room, isOff: true });
                syncLocalCamPip();
                syncCallControls();
                showHostNotification(`${by} turned off your camera`);
            } else if (action === 'remove') {
                alert(`You were removed from the meeting by ${by}.`);
                leaveMeeting();
            } else if (action === 'disable-chat') {
                chatBanned = true;
                setChatAvailability();
                showHostNotification(`${by} disabled your chat`);
            } else if (action === 'enable-chat') {
                chatBanned = false;
                setChatAvailability();
                showHostNotification(`${by} re-enabled your chat`);
            }
        });

        function createPeerConnection(id) {
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' }
                ]
            });

            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });

            pc.ontrack = (event) => {
                console.log("Received remote track");
                addRemoteVideo(id, event.streams[0]);
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit("signal", {
                        to: id,
                        signal: {
                            candidate: event.candidate
                        }
                    });
                }
            };

            return pc;
        }

        function sendHostControl(targetId, action) {
            socket.emit('host-control', { room, targetId, action });
        }

        function toggleParticipantChat(targetId) {
            const isBanned = !!participantChatBanned[targetId];
            sendHostControl(targetId, isBanned ? 'enable-chat' : 'disable-chat');
            participantChatBanned[targetId] = !isBanned;
            const btn = document.getElementById(`chat-ban-btn-${targetId}`);
            if (btn) {
                btn.classList.toggle('banned', !isBanned);
                btn.title = participantChatBanned[targetId] ? 'Re-enable chat' : 'Disable chat';
            }
        }

        function showHostNotification(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position:fixed; bottom:88px; left:50%; transform:translateX(-50%);
                background:rgba(0,0,0,0.85); color:white; padding:10px 22px;
                border-radius:20px; font-size:13px; z-index:1000;
                backdrop-filter:blur(8px); pointer-events:none;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        function addRemoteVideo(id, stream) {
            if (!document.getElementById(`video-${id}`)) {
                const wrapper = document.createElement('div');
                wrapper.className = 'video-wrapper';
                wrapper.id = `tile-${id}`;
                wrapper.innerHTML = `
                    <video id="video-${id}" autoplay playsinline></video>
                    <div class="video-label">${escapeHtml(userNames[id] || 'Remote User')}</div>
                `;

                if (isHost) {
                    const controls = document.createElement('div');
                    controls.className = 'host-controls';

                    const mkBtn = (emoji, title, handler) => {
                        const b = document.createElement('button');
                        b.className = 'host-btn';
                        b.title = title;
                        b.textContent = emoji;
                        b.onclick = handler;
                        return b;
                    };

                    const chatBtn = mkBtn('💬', 'Disable chat', () => toggleParticipantChat(id));
                    chatBtn.id = `chat-ban-btn-${id}`;

                    controls.appendChild(mkBtn('🔇', 'Mute microphone',     () => sendHostControl(id, 'mute-audio')));
                    controls.appendChild(mkBtn('🚫', 'Turn off camera',     () => sendHostControl(id, 'mute-video')));
                    controls.appendChild(chatBtn);
                    controls.appendChild(mkBtn('✕',  'Remove from meeting', () => sendHostControl(id, 'remove')));
                    wrapper.appendChild(controls);
                }

                videosContainer.appendChild(wrapper);
            }
            document.getElementById(`video-${id}`).srcObject = stream;
            setTileCameraState(`tile-${id}`, userNames[id] || 'Remote User', !!remoteCameraOff[id]);
            updateGrid();
        }

        async function loadChatMessages() {
            try {
                const response = await fetch(`/api/meetings/${room}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const msgs = await response.json();
                for (const msg of msgs) {
                    const decrypted = await decryptIncomingMessage(msg);
                    addMessageToChat(decrypted);
                }
            } catch (err) {
                console.error('Error loading messages:', err);
            }
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function formatAttachmentSize(size) {
            if (!size) return '';
            if (size < 1024) return `${size} B`;
            if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
            return `${(size / (1024 * 1024)).toFixed(1)} MB`;
        }

        async function downloadAttachment(storedName, fileName) {
            try {
            const endpoint = `/api/meetings/${encodeURIComponent(room)}/attachments/${encodeURIComponent(storedName || '')}`;
            const resolved = new URL(endpoint, window.location.origin);
            const resolvedUrl = resolved.toString();
            const fallbackRelativeUrl = `${resolved.pathname}${resolved.search}`;
            console.log('Downloading:', { endpoint, url: resolvedUrl, fallbackRelativeUrl, fileName });

                let response;
                try {
                    response = await fetch(resolvedUrl, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                } catch (firstErr) {
                    // Retry with same-origin relative path if absolute URL fetch fails.
                    response = await fetch(fallbackRelativeUrl, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                }

                console.log('Download response status:', response.status);

                if (!response.ok) {
                    const payload = await response.json().catch(() => null);
                    const errorMsg = payload?.error || `Failed to download attachment (${response.status})`;
                    console.error('Download failed:', errorMsg);
                    throw new Error(errorMsg);
                }

                const encryptedBuffer = await response.arrayBuffer();
                let finalBuffer;
                if (e2eeRoomKey) {
                    try {
                        finalBuffer = await e2eeDecryptFile(encryptedBuffer);
                    } catch (err) {
                        throw new Error('Could not decrypt attachment — it may be from a different session');
                    }
                } else {
                    finalBuffer = encryptedBuffer;
                }

                const downloadUrl = URL.createObjectURL(new Blob([finalBuffer]));
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = fileName || 'attachment';
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(downloadUrl);
                console.log('Download completed');
            } catch (err) {
                console.error('Download error:', err);
                alert(err.message);
            }
        }

        function utf8ToBase64(value) {
            return btoa(unescape(encodeURIComponent(value || '')));
        }

        function base64ToUtf8(value) {
            return decodeURIComponent(escape(atob(value || '')));
        }

        function downloadAttachmentFromLink(event) {
            event.preventDefault();
            const link = event.currentTarget;
            const storedName = base64ToUtf8(link.dataset.storedNameB64 || '');
            const urlFallback = base64ToUtf8(link.dataset.urlB64 || '');
            const fileName = base64ToUtf8(link.dataset.nameB64 || '') || 'attachment';
            if (storedName) {
                downloadAttachment(storedName, fileName);
                return;
            }
            if (urlFallback) {
                const filePart = urlFallback.split('/attachments/')[1] || '';
                if (filePart) {
                    downloadAttachment(decodeURIComponent(filePart), fileName);
                    return;
                }
            }
            alert('Attachment identifier is missing');
        }

        function addMessageToChat(entryOrUser, messageText) {
            const entry = typeof entryOrUser === 'object'
                ? entryOrUser
                : { name: entryOrUser, message: messageText, kind: 'text' };
            const user = entry.name || 'User';
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message';
            const time = new Date(entry.createdAt || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            let body = escapeHtml(entry.message || '');

            if (entry.kind === 'attachment' && entry.attachment) {
                const encodedStoredName = utf8ToBase64(entry.attachment.storedName || '');
                const encodedUrl = utf8ToBase64(entry.attachment.url || '');
                const encodedName = utf8ToBase64(entry.attachment.originalName || 'attachment');
                body = `
                    <a class="message-attachment" href="#" data-stored-name-b64="${encodedStoredName}" data-url-b64="${encodedUrl}" data-name-b64="${encodedName}" onclick="downloadAttachmentFromLink(event)">
                        <span>📎</span>
                        <span>${escapeHtml(entry.attachment.originalName)}</span>
                    </a>
                    <div class="attachment-meta">${escapeHtml(entry.attachment.mimeType || 'file')} • ${formatAttachmentSize(entry.attachment.size)}</div>
                `;
            }

            msgDiv.innerHTML = `
                <div class="message-user">${escapeHtml(user)}</div>
                ${body}
                <div class="message-time">${time}</div>
            `;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            if (!e2eeRoomKey || chatBanned || (roomChatLocked && !isHost)) return;
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message) return;

            try {
                const encrypted = await e2eeEncryptText(message);

                const response = await fetch(`/api/meetings/${room}/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ message: encrypted })
                });

                if (!response.ok) {
                    const payload = await response.json().catch(() => null);
                    throw new Error(payload?.error || 'Failed to send message');
                }

                socket.emit('send-message', { room, message: encrypted });
                input.value = '';
            } catch (err) {
                alert(err.message);
                console.error('Error sending message:', err);
            }
        }

        function openAttachmentPicker() {
            if (!e2eeRoomKey || chatBanned || (roomChatLocked && !isHost)) return;
            chatFileInput.click();
        }

        async function handleAttachmentSelected(event) {
            const file = event.target.files?.[0];
            if (!file) return;

            if (!e2eeRoomKey || chatBanned || (roomChatLocked && !isHost)) {
                alert(!e2eeRoomKey ? 'Secure channel not ready yet.' : chatBanned ? 'Your chat is disabled.' : 'Chat is locked right now.');
                event.target.value = '';
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                alert('File must be 10MB or smaller.');
                event.target.value = '';
                return;
            }

            try {
                // Encrypt file content client-side before uploading
                const arrayBuffer = await file.arrayBuffer();
                const encryptedBuffer = await e2eeEncryptFile(arrayBuffer);
                const encryptedBlob = new Blob([encryptedBuffer], { type: 'application/octet-stream' });
                const encryptedOriginalName = await e2eeEncryptText(file.name);

                const formData = new FormData();
                formData.append('file', encryptedBlob, file.name);
                // Pass original metadata so server can report correct type/size in the message
                formData.append('mimeType', file.type || 'application/octet-stream');
                formData.append('fileSize', String(file.size));
                formData.append('originalName', encryptedOriginalName);
                formData.append('originalNameEncrypted', '1');

                const response = await fetch(`/api/meetings/${room}/attachments`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                const payload = await response.json().catch(() => null);
                if (!response.ok) {
                    throw new Error(payload?.error || 'Failed to upload attachment');
                }
            } catch (err) {
                alert(err.message);
            } finally {
                event.target.value = '';
            }
        }

        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function toggleChat() {
            const chat = document.getElementById('chatSection');
            const btn = document.querySelector('.btn-toggle');
            chat.classList.toggle('active');
            btn.classList.toggle('active', chat.classList.contains('active'));
        }

        function copyMeetingCode() {
            navigator.clipboard.writeText(room).then(() => {
                alert('Meeting code copied!');
            });
        }

        function leaveMeeting() {
            if (isPresenting) stopPresent();
            if (localStream){
                localStream.getTracks().forEach(track => track.stop());
            }
            Object.values(peerConnections).forEach(pc => pc.close());
            socket.disconnect();
            window.location.href = '/dashboard.html';
        }

        function updateGrid(){
            const count = videosContainer.querySelectorAll('.video-wrapper').length;
            for (let i = 1; i <= 9; i++) videosContainer.classList.remove(`p${i}`);
            videosContainer.classList.add(`p${Math.min(count, 9)}`);
        }

        window.addEventListener('load', initLobby);
    </script>
