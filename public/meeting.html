<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting - Sup!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            flex-shrink: 0;
            height: 56px;
            background: #1e1e1e;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
            z-index: 10;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        h1 { color: white; font-size: 18px; font-weight: 700; }
        .meeting-code {
            background: #2a2a2a; color: #aaa;
            padding: 4px 10px; border-radius: 4px;
            font-size: 12px; font-family: monospace;
        }
        .copy-btn {
            background: none; border: none; color: #aaa;
            cursor: pointer; padding: 4px 8px; font-size: 12px; transition: color 0.2s;
        }
        .copy-btn:hover { color: white; }
        .header-right { display: flex; gap: 8px; align-items: center; }
        button {
            padding: 8px 14px; border: none; border-radius: 6px;
            cursor: pointer; font-weight: 600; transition: background 0.2s;
        }
        .btn-leave { background: #c62828; color: white; border-radius: 20px; padding: 8px 20px; }
        .btn-leave:hover { background: #b71c1c; }
        .btn-toggle { background: #2a2a2a; color: white; font-size: 13px; border-radius: 20px; }
        .btn-toggle:hover { background: #3a3a3a; }
        .btn-toggle.active { background: #667eea; }

        /* ── Main layout ── */
        .main-content { flex: 1; display: flex; overflow: hidden; min-height: 0; }

        /* ── Video area ── */
        .video-section {
            flex: 1; display: flex; flex-direction: column;
            min-width: 0; background: #111; overflow: hidden;
        }
        .videos-container {
            flex: 1; display: grid; gap: 4px; padding: 6px;
            overflow: hidden; min-height: 0; min-width: 0;
        }

        /* Dynamic grid by participant count */
        .videos-container.p1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        .videos-container.p2 { grid-template-columns: repeat(2, 1fr); grid-template-rows: 1fr; }
        .videos-container.p3 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .videos-container.p4 { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); }
        .videos-container.p5 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .videos-container.p6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
        .videos-container.p7 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); }
        .videos-container.p8 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); }
        .videos-container.p9 { grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); }
        /* 3rd tile spans full width when alone in second row */
        .videos-container.p3 .video-wrapper:last-child { grid-column: span 2; }
        /* 5th tile centred in last row */
        .videos-container.p5 .video-wrapper:last-child { grid-column: 2 / 3; }

        .video-wrapper {
            background: #1c1c1c; border-radius: 10px;
            overflow: hidden; position: relative;
            min-width: 0; min-height: 0;
        }
        .video-wrapper video:not(#localCamPip) { width: 100%; height: 100%; object-fit: contain; display: block; background: #000; }
        #localCamPip {
            position: absolute;
            right: 12px;
            bottom: 44px;
            width: 280px;
            max-width: 45%;
            aspect-ratio: 16 / 9;
            height: auto;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.35);
            background: #000;
            z-index: 5;
            transform: scaleX(-1);
            pointer-events: none;
            display: none;
        }
        .video-label {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(0,0,0,0.55); color: white;
            padding: 4px 10px; border-radius: 20px;
            font-size: 12px; font-weight: 500;
            backdrop-filter: blur(4px); pointer-events: none;
        }
        .camera-off {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
        }
        .camera-off.active { display: flex; }
        .camera-avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 28px;
            font-weight: 700;
            background: rgba(255,255,255,0.16);
            border: 1px solid rgba(255,255,255,0.28);
            backdrop-filter: blur(4px);
            color: #fff;
        }
        .camera-name {
            font-size: 13px;
            color: #fff;
            opacity: 0.95;
        }

        /* ── Chat sidebar ── */
        .chat-section {
            width: 320px; flex-shrink: 0;
            background: #1e1e1e; border-left: 1px solid #2a2a2a;
            display: none; flex-direction: column; overflow: hidden;
        }
        .chat-section.active { display: flex; }
        .chat-header {
            padding: 15px 18px; border-bottom: 1px solid #2a2a2a;
            color: white; font-weight: 600; font-size: 15px; flex-shrink: 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .chat-close {
            background: none; border: none; color: #555;
            cursor: pointer; font-size: 18px; padding: 0; line-height: 1;
        }
        .chat-close:hover { color: white; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 12px 14px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .chat-messages::-webkit-scrollbar { width: 3px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 4px; }
        .chat-message {
            padding: 9px 12px; border-radius: 8px;
            background: #2a2a2a; color: #ddd; font-size: 13px; word-break: break-word;
        }
        .message-user { font-weight: 600; color: #667eea; margin-bottom: 3px; font-size: 12px; }
        .message-time { font-size: 10px; color: #555; margin-top: 3px; }
        .chat-input {
            padding: 10px 14px; border-top: 1px solid #2a2a2a;
            display: flex; gap: 8px; flex-shrink: 0;
        }
        .chat-input input {
            flex: 1; padding: 8px 12px; border: 1px solid #3a3a3a;
            border-radius: 20px; background: #2a2a2a; color: white; font-size: 13px; outline: none;
        }
        .chat-input input:focus { border-color: #667eea; }
        .chat-input button {
            background: #667eea; color: white; border-radius: 20px; padding: 8px 14px; font-size: 13px;
        }
        .chat-input button:hover { background: #5568d3; }

        /* ── Call controls bar ── */
        .call-controls {
            flex-shrink: 0; height: 68px;
            display: flex; justify-content: center; align-items: center; gap: 14px;
            background: #1e1e1e; border-top: 1px solid #2a2a2a;
        }
        .call-controls button {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: background 0.2s, transform 0.1s;
        }
        .call-controls button:active { transform: scale(0.92); }
        .ctrl-on { background: #2a2a2a !important; color: white; }
        .ctrl-off { background: #c62828 !important; color: white; }

        /* ── Lobby ── */
        .lobby-overlay {
            position: fixed; inset: 0; background: #111; z-index: 200;
            display: flex; align-items: center; justify-content: center;
        }
        .lobby-overlay.hidden { display: none; }
        .lobby-card {
            background: #1e1e1e; border-radius: 20px; padding: 32px;
            width: 500px; max-width: 95vw;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.6);
        }
        .lobby-card h2 { color: white; font-size: 22px; font-weight: 700; }
        .lobby-preview {
            width: 100%; aspect-ratio: 16/9;
            background: #111; border-radius: 14px; overflow: hidden; position: relative;
        }
        .lobby-preview video { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); background: #000; }
        .lobby-preview .cam-off-placeholder {
            position: absolute; inset: 0; display: flex;
            align-items: center; justify-content: center; color: #444; font-size: 48px;
        }
        .lobby-preview .cam-off-placeholder.hidden { display: none; }
        .lobby-controls { display: flex; gap: 16px; }
        .lobby-controls button {
            width: 52px; height: 52px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: background 0.2s, transform 0.1s;
        }
        .lobby-controls button:active { transform: scale(0.92); }
        .lobby-controls .ctrl-on { background: #2a2a2a; color: white; }
        .lobby-controls .ctrl-off { background: #c62828; color: white; }
        .lobby-info { color: #888; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .lobby-info .dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
        .btn-join-now {
            background: #667eea; color: white; font-size: 16px;
            padding: 14px 52px; border-radius: 30px; border: none;
            cursor: pointer; font-weight: 600; transition: background 0.2s, transform 0.1s;
        }
        .btn-join-now:hover { background: #5568d3; }
        .btn-join-now:active { transform: scale(0.97); }
        .btn-back {
            background: none; border: 1px solid #3a3a3a; color: #888;
            padding: 8px 22px; border-radius: 20px; cursor: pointer; font-size: 13px;
        }
        .btn-back:hover { border-color: #666; color: #ccc; }

        @media (max-width: 640px) {
            .chat-section { width: 100%; position: absolute; bottom: 68px; top: 56px; z-index: 5; }
            .videos-container.p2 { grid-template-columns: 1fr; grid-template-rows: repeat(2, 1fr); }
            .videos-container.p3 .video-wrapper:last-child { grid-column: span 1; }
        }
    </style>
</head>
<body>
    <!-- Pre-join Lobby -->
    <div class="lobby-overlay" id="lobbyOverlay">
        <div class="lobby-card">
            <h2>Ready to join?</h2>
            <div class="lobby-preview">
                <video id="lobbyVideo" autoplay muted playsinline></video>
                <div class="cam-off-placeholder hidden" id="camOffPlaceholder">📷</div>
            </div>
            <div class="lobby-controls">
                <button id="lobbyMicBtn" class="ctrl-on" onclick="toggleLobbyMic()" title="Toggle microphone">🎤</button>
                <button id="lobbyCamBtn" class="ctrl-on" onclick="toggleLobbyCam()" title="Toggle camera">📷</button>
            </div>
            <div class="lobby-info" id="lobbyInfo">
                <span class="dot"></span>
                <span id="lobbyParticipantText">Checking room...</span>
            </div>
            <button class="btn-join-now" onclick="joinCall()">Join now</button>
            <button class="btn-back" onclick="window.location.href='/dashboard.html'">Back to dashboard</button>
        </div>
    </div>

    <div class="header">
        <div class="header-left">
            <h1>Sup! Meeting</h1>
            <div class="meeting-code" id="meetingCode"></div>
            <button class="copy-btn" onclick="copyMeetingCode()">Copy</button>
        </div>
        <div class="header-right">
            <button class="btn-toggle" onclick="toggleChat()">Chat</button>
            <button class="btn-leave" onclick="leaveMeeting()">Leave</button>
        </div>
    </div>

    <div class="main-content">
        <div class="video-section">
            <div class="videos-container" id="videosContainer">
                <div class="video-wrapper" id="tile-local">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <video id="localCamPip" autoplay muted playsinline></video>
                    <div class="video-label" id="localVideoLabel">You</div>
                </div>
            </div>
        </div>

        <div class="chat-section" id="chatSection">
            <div class="chat-header">
                Chat
                <button class="chat-close" onclick="toggleChat()" title="Close chat">✕</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="handleChatKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- In-call controls -->
    <div class="call-controls" id="callControls">
        <button id="callMicBtn" class="ctrl-on" onclick="toggleCallMic()" title="Toggle microphone">🎤</button>
        <button id="callCamBtn" class="ctrl-on" onclick="toggleCallCam()" title="Toggle camera">📷</button>
        <button id="presentbtn" class="ctrl-on" onclick="togglePresent()" title="Toggle presentation">📽️</button>
        <button id="leaveBtn" class="ctrl-on" onclick="leaveMeeting()" title="Leave meeting">🚪</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const room = params.get('room') || 'unknown-room';
        
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        }

        document.getElementById('meetingCode').textContent = room;

        const socket = io();
        let localStream;
        let peerConnections = {};
        let userNames = {};
        let remoteCameraOff = {};
        let micEnabled = true;
        let camEnabled = true;
        let currentUser = null;

        const localVideo = document.getElementById('localVideo');
        const localCamPip = document.getElementById('localCamPip');
        const videosContainer = document.getElementById('videosContainer');
        const chatMessages = document.getElementById('chatMessages');

        // Fetch current user info
        async function getCurrentUser() {
            const response = await fetch('/api/user/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            return await response.json();
        }

        function getInitials(name) {
            return (name || 'User')
                .split(' ')
                .filter(Boolean)
                .map(part => part[0])
                .join('')
                .slice(0, 2)
                .toUpperCase();
        }

        function themeFromName(name) {
            const themes = [
                ['#0f2027', '#2c5364'],
                ['#42275a', '#734b6d'],
                ['#134e5e', '#71b280'],
                ['#1f4037', '#99f2c8'],
                ['#373b44', '#4286f4']
            ];
            let hash = 0;
            const value = name || 'User';
            for (let i = 0; i < value.length; i++) hash += value.charCodeAt(i);
            return themes[hash % themes.length];
        }

        function setTileCameraState(tileId, userName, isOff) {
            const wrapper = document.getElementById(tileId);
            if (!wrapper) return;

            const video = wrapper.querySelector('video');
            let placeholder = wrapper.querySelector('.camera-off');

            if (!placeholder) {
                placeholder = document.createElement('div');
                placeholder.className = 'camera-off';
                placeholder.innerHTML = `
                    <div class="camera-avatar"></div>
                    <div class="camera-name"></div>
                `;
                wrapper.appendChild(placeholder);
            }

            const [startColor, endColor] = themeFromName(userName);
            placeholder.style.background = `linear-gradient(135deg, ${startColor}, ${endColor})`;
            placeholder.querySelector('.camera-avatar').textContent = getInitials(userName);
            placeholder.querySelector('.camera-name').textContent = userName || 'User';
            placeholder.classList.toggle('active', !!isOff);

            if (video) {
                video.style.visibility = isOff ? 'hidden' : 'visible';
            }
        }

        // ============ LOBBY ============
        async function initLobby() {
            try {
                currentUser = await getCurrentUser();
                userNames['local'] = currentUser.name;

                // Get camera preview for lobby
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localStream = stream;
                document.getElementById('lobbyVideo').srcObject = stream;

                // Check how many people are in the room
                try {
                    const res = await fetch(`/api/rooms/${room}/participants`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    const text = data.count === 0
                        ? 'No one else is here yet'
                        : `${data.count} person${data.count > 1 ? 's' : ''} in this meeting`;
                    document.getElementById('lobbyParticipantText').textContent = text;
                } catch {
                    document.getElementById('lobbyParticipantText').textContent = 'Ready to connect';
                }
            } catch (error) {
                console.error('Lobby init error:', error);
                document.getElementById('lobbyParticipantText').textContent = 'Camera / mic unavailable';
            }
        }

        function toggleLobbyMic() {
            if (!localStream) return;
            micEnabled = !micEnabled;
            localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
            const btn = document.getElementById('lobbyMicBtn');
            btn.className = micEnabled ? 'ctrl-on' : 'ctrl-off';
            btn.textContent = micEnabled ? '🎤' : '🔇';
        }

        function toggleLobbyCam() {
            if (!localStream) return;
            camEnabled = !camEnabled;
            localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
            const btn = document.getElementById('lobbyCamBtn');
            btn.className = camEnabled ? 'ctrl-on' : 'ctrl-off';
            btn.textContent = camEnabled ? '📷' : '🚫';

            document.getElementById('lobbyVideo').style.display = camEnabled ? '' : 'none';
            document.getElementById('camOffPlaceholder').classList.toggle('hidden', camEnabled);
        }

        // ============ JOIN CALL ============
        async function joinCall() {
            // Hide lobby, show meeting
            document.getElementById('lobbyOverlay').classList.add('hidden');

            // Sync in-call buttons with lobby state
            syncCallControls();

            try {
                // Register join in DB (works for scheduled meetings, ignored for disposable)
                try {
                    await fetch(`/api/meetings/${room}/join`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                } catch (e) { /* disposable meeting — no DB record */ }

                // Assign stream to local video
                localVideo.srcObject = localStream;
                syncLocalCamPip();

                // Update local video label with real name
                document.getElementById('localVideoLabel').textContent = currentUser.name + ' (You)';
                setTileCameraState('tile-local', currentUser.name + ' (You)', !camEnabled);

                // Join socket room
                socket.emit('join-room', room, currentUser.id, currentUser.name);
                socket.emit('camera-state', { room, isOff: !camEnabled });

                // Set initial grid layout (just local video = p1)
                updateGrid();

                // Load persisted chat messages
                try { await loadChatMessages(); } catch (e) { /* no persisted messages */ }
            } catch (error) {
                console.error('Error joining call:', error);
            }
        }

        // ============ IN-CALL CONTROLS ============
        function syncCallControls() {
            const micBtn = document.getElementById('callMicBtn');
            const camBtn = document.getElementById('callCamBtn');
            micBtn.className = micEnabled ? 'ctrl-on' : 'ctrl-off';
            micBtn.textContent = micEnabled ? '🎤' : '🔇';
            camBtn.className = camEnabled ? 'ctrl-on' : 'ctrl-off';
            camBtn.textContent = camEnabled ? '📷' : '🚫';
        }

        function toggleCallMic() {
            if (!localStream) return;
            micEnabled = !micEnabled;
            localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
            syncCallControls();
        }

        function toggleCallCam() {
            if (!localStream) return;
            camEnabled = !camEnabled;
            localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
            const showCameraOff = isPresenting ? false : !camEnabled;
            setTileCameraState('tile-local', (currentUser?.name || 'You') + ' (You)', showCameraOff);
            if (currentUser && !isPresenting) {
                socket.emit('camera-state', { room, isOff: !camEnabled });
            }
            syncLocalCamPip();
            syncCallControls();
        }

        let isPresenting = false;
        let screenStream = null;

        function syncPresentButton() {
            const btn = document.getElementById('presentbtn');
            if (!btn) return;
            btn.classList.toggle('ctrl-off', isPresenting);
            btn.classList.toggle('ctrl-on', !isPresenting);
            btn.textContent = isPresenting ? '🛑' : '📽️';
            btn.title = isPresenting ? 'Stop presenting' : 'Present screen';
        }

        function replaceVideoTrack(newTrack) {
            Object.values(peerConnections).forEach(pc => {
                const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
                if (sender) sender.replaceTrack(newTrack);
            });
        }

        function syncLocalCamPip() {
            if (!localCamPip) return;
            const shouldShow = isPresenting && camEnabled && !!localStream?.getVideoTracks()?.length;
            localCamPip.style.display = shouldShow ? 'block' : 'none';
            if (shouldShow) {
                if (localCamPip.srcObject !== localStream) {
                    localCamPip.srcObject = localStream;
                }
                localCamPip.play().catch(() => {});
            } else {
                localCamPip.srcObject = null;
            }
        }

        async function startPresent() {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
                const screenTrack = screenStream.getVideoTracks()[0];
                if (!screenTrack) return;
                replaceVideoTrack(screenTrack);

                // Show shared screen in main local view and camera as PiP.
                localVideo.srcObject = screenStream;
                setTileCameraState('tile-local', (currentUser?.name || 'You') + ' (You)', false);

                isPresenting = true;
                syncPresentButton();
                syncLocalCamPip();
                screenTrack.onended = () => stopPresent();
            } catch (err) {
                console.error('Error starting presentation:', err);
            }
        }

        function stopPresent() {
            if (!isPresenting) return;
            if (screenStream) {
                screenStream.getTracks().forEach(t => t.stop());
                screenStream = null;
            }
            const camTrack = localStream?.getVideoTracks()?.[0];
            if (camTrack) replaceVideoTrack(camTrack);
            localVideo.srcObject = localStream;
            setTileCameraState('tile-local', (currentUser?.name || 'You') + ' (You)', !camEnabled);
            isPresenting = false;
            syncPresentButton();
            syncLocalCamPip();
        
        }
        async function togglePresent() {
            if (isPresenting) {
                stopPresent();
            } else {
                await startPresent();
            }
        }


        // ============ WEBRTC ============
        socket.on("user-joined", async (id, name) => {
            console.log("User joined:", id, name);
            if (name) userNames[id] = name;
            const pc = createPeerConnection(id);
            peerConnections[id] = pc;
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            socket.emit("signal", {
                to: id,
                signal: offer
            });
        });

        socket.on("signal", async (data) => {
            let pc = peerConnections[data.from];
            
            if (!pc) {
                pc = createPeerConnection(data.from);
                peerConnections[data.from] = pc;
            }
            
            if (data.signal.type === 'offer') {
                await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                socket.emit("signal", {
                    to: data.from,
                    signal: answer
                });
            } else if (data.signal.type === 'answer') {
                await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
            } else if (data.signal.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
            }
        });

        socket.on("user-left", (id) => {
            if (peerConnections[id]) {
                peerConnections[id].close();
                delete peerConnections[id];
            }
            delete remoteCameraOff[id];
            const videoElement = document.getElementById(`video-${id}`);
            if (videoElement) {
                videoElement.parentElement.remove();
            }
            updateGrid();
        });

        socket.on("receive-message", (data) => {
            addMessageToChat(data.userId || 'User', data.message);
        });

        socket.on('camera-state', ({ from, isOff }) => {
            remoteCameraOff[from] = !!isOff;
            setTileCameraState(`tile-${from}`, userNames[from] || 'Remote User', !!isOff);
        });

        function createPeerConnection(id) {
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' }
                ]
            });

            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });

            pc.ontrack = (event) => {
                console.log("Received remote track");
                addRemoteVideo(id, event.streams[0]);
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit("signal", {
                        to: id,
                        signal: {
                            candidate: event.candidate
                        }
                    });
                }
            };

            return pc;
        }

        function addRemoteVideo(id, stream) {
            if (!document.getElementById(`video-${id}`)) {
                const wrapper = document.createElement('div');
                wrapper.className = 'video-wrapper';
                wrapper.id = `tile-${id}`;
                wrapper.innerHTML = `
                    <video id="video-${id}" autoplay playsinline></video>
                    <div class="video-label">${userNames[id] || 'Remote User'}</div>
                `;
                videosContainer.appendChild(wrapper);
            }
            document.getElementById(`video-${id}`).srcObject = stream;
            setTileCameraState(`tile-${id}`, userNames[id] || 'Remote User', !!remoteCameraOff[id]);
            updateGrid();
        }

        async function loadChatMessages() {
            try {
                const response = await fetch(`/api/meetings/${room}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const messages = await response.json();
                messages.forEach(msg => {
                    addMessageToChat(msg.name, msg.message);
                });
            } catch (err) {
                console.error('Error loading messages:', err);
            }
        }

        function addMessageToChat(user, message) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message';
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            msgDiv.innerHTML = `
                <div class="message-user">${user}</div>
                ${message}
                <div class="message-time">${time}</div>
            `;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;

            try {
                await fetch(`/api/meetings/${room}/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ message })
                });

                socket.emit('send-message', { room, message });
                addMessageToChat('You', message);
                input.value = '';
            } catch (err) {
                console.error('Error sending message:', err);
            }
        }

        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function toggleChat() {
            const chat = document.getElementById('chatSection');
            const btn = document.querySelector('.btn-toggle');
            chat.classList.toggle('active');
            btn.classList.toggle('active', chat.classList.contains('active'));
        }

        function copyMeetingCode() {
            navigator.clipboard.writeText(room).then(() => {
                alert('Meeting code copied!');
            });
        }

        function leaveMeeting() {
            if (isPresenting) stopPresent();
            if (localStream){
                localStream.getTracks().forEach(track => track.stop());
            }
            Object.values(peerConnections).forEach(pc => pc.close());
            socket.disconnect();
            window.location.href = '/dashboard.html';
        }

        function updateGrid(){
            const count = videosContainer.querySelectorAll('.video-wrapper').length;
            for (let i = 1; i <= 9; i++) videosContainer.classList.remove(`p${i}`);
            videosContainer.classList.add(`p${Math.min(count, 9)}`);
        }

        window.addEventListener('load', initLobby);
    </script>
</body>
</html>
