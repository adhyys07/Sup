<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting - Sup!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #222;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        h1 {
            color: white;
            font-size: 20px;
        }
        .meeting-code {
            background: #333;
            color: #aaa;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-family: monospace;
        }
        .copy-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 12px;
            transition: color 0.3s;
        }
        .copy-btn:hover {
            color: white;
        }
        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }
        .btn-leave {
            background: #d32f2f;
            color: white;
        }
        .btn-leave:hover {
            background: #c62828;
        }
        .btn-toggle {
            background: #667eea;
            color: white;
            padding: 8px 12px;
            font-size: 14px;
        }
        .btn-toggle:hover {
            background: #5568d3;
        }
        .main-content {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px;
            overflow: hidden;
        }
        .video-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .videos-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            overflow: auto;
        }
        .video-wrapper {
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 300px;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
        .chat-section {
            width: 300px;
            background: #222;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            display: none;
        }
        .chat-section.active {
            display: flex;
        }
        .chat-header {
            background: #333;
            padding: 15px;
            border-bottom: 1px solid #444;
            color: white;
            font-weight: 600;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .chat-message {
            background: #333;
            padding: 10px;
            border-radius: 6px;
            color: white;
            font-size: 13px;
        }
        .message-user {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 3px;
        }
        .message-time {
            font-size: 11px;
            color: #999;
            margin-top: 3px;
        }
        .chat-input {
            padding: 10px;
            border-top: 1px solid #444;
            display: flex;
            gap: 8px;
        }
        .chat-input input {
            flex: 1;
            padding: 8px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #333;
            color: white;
            font-size: 14px;
        }
        .chat-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        .chat-input button {
            padding: 8px 12px;
            background: #667eea;
            color: white;
            font-size: 13px;
        }
        .chat-input button:hover {
            background: #5568d3;
        }
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            .chat-section {
                width: 100%;
                height: 200px;
            }
        }

        /* Lobby / Pre-join screen */
        .lobby-overlay {
            position: fixed;
            inset: 0;
            background: #1a1a1a;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lobby-overlay.hidden { display: none; }
        .lobby-card {
            background: #222;
            border-radius: 16px;
            padding: 30px;
            width: 520px;
            max-width: 95vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .lobby-card h2 {
            color: white;
            font-size: 22px;
        }
        .lobby-preview {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .lobby-preview video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        .lobby-preview .cam-off-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 48px;
        }
        .lobby-controls {
            display: flex;
            gap: 16px;
        }
        .lobby-controls button {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: background 0.2s;
        }
        .lobby-controls .ctrl-on { background: #333; color: white; }
        .lobby-controls .ctrl-off { background: #d32f2f; color: white; }
        .lobby-info {
            color: #aaa;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .lobby-info .dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; }
        .btn-join-now {
            background: #667eea;
            color: white;
            font-size: 16px;
            padding: 14px 48px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-join-now:hover { background: #5568d3; }
        .btn-back {
            background: none;
            border: 1px solid #555;
            color: #aaa;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-back:hover { border-color: #888; color: white; }

        /* In-call mic/cam toggle bar */
        .call-controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 12px 0;
            background: #222;
            border-top: 1px solid #333;
        }
        .call-controls button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s;
        }
        .call-controls .ctrl-on { background: #333; color: white; }
        .call-controls .ctrl-off { background: #d32f2f; color: white; }
    </style>
</head>
<body>
    <!-- Pre-join Lobby -->
    <div class="lobby-overlay" id="lobbyOverlay">
        <div class="lobby-card">
            <h2>Ready to join?</h2>
            <div class="lobby-preview">
                <video id="lobbyVideo" autoplay muted playsinline></video>
                <div class="cam-off-placeholder hidden" id="camOffPlaceholder">📷</div>
            </div>
            <div class="lobby-controls">
                <button id="lobbyMicBtn" class="ctrl-on" onclick="toggleLobbyMic()" title="Toggle microphone">🎤</button>
                <button id="lobbyCamBtn" class="ctrl-on" onclick="toggleLobbyCam()" title="Toggle camera">📷</button>
            </div>
            <div class="lobby-info" id="lobbyInfo">
                <span class="dot"></span>
                <span id="lobbyParticipantText">Checking room...</span>
            </div>
            <button class="btn-join-now" onclick="joinCall()">Join now</button>
            <button class="btn-back" onclick="window.location.href='/dashboard.html'">Back to dashboard</button>
        </div>
    </div>

    <div class="header">
        <div class="header-left">
            <h1>Sup! Meeting</h1>
            <div class="meeting-code" id="meetingCode"></div>
            <button class="copy-btn" onclick="copyMeetingCode()">Copy</button>
        </div>
        <div class="header-right">
            <button class="btn-toggle" onclick="toggleChat()">Chat</button>
            <button class="btn-leave" onclick="leaveMeeting()">Leave</button>
        </div>
    </div>

    <div class="main-content">
        <div class="video-section">
            <div class="videos-container" id="videosContainer">
                <div class="video-wrapper">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="video-label">You (Local)</div>
                </div>
            </div>
        </div>

        <div class="chat-section" id="chatSection">
            <div class="chat-header">Chat</div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="Type a message..." onkeypress="handleChatKeyPress(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <!-- In-call controls -->
    <div class="call-controls" id="callControls">
        <button id="callMicBtn" class="ctrl-on" onclick="toggleCallMic()" title="Toggle microphone">🎤</button>
        <button id="callCamBtn" class="ctrl-on" onclick="toggleCallCam()" title="Toggle camera">📷</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const room = params.get('room') || 'unknown-room';
        
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/';
        }

        document.getElementById('meetingCode').textContent = room;

        const socket = io();
        let localStream;
        let peerConnections = {};
        let userNames = {};
        let micEnabled = true;
        let camEnabled = true;
        let currentUser = null;

        const localVideo = document.getElementById('localVideo');
        const videosContainer = document.getElementById('videosContainer');
        const chatMessages = document.getElementById('chatMessages');

        // Fetch current user info
        async function getCurrentUser() {
            const response = await fetch('/api/user/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            return await response.json();
        }

        // ============ LOBBY ============
        async function initLobby() {
            try {
                currentUser = await getCurrentUser();
                userNames['local'] = currentUser.name;

                // Get camera preview for lobby
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                localStream = stream;
                document.getElementById('lobbyVideo').srcObject = stream;

                // Check how many people are in the room
                try {
                    const res = await fetch(`/api/rooms/${room}/participants`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    const text = data.count === 0
                        ? 'No one else is here yet'
                        : `${data.count} person${data.count > 1 ? 's' : ''} in this meeting`;
                    document.getElementById('lobbyParticipantText').textContent = text;
                } catch {
                    document.getElementById('lobbyParticipantText').textContent = 'Ready to connect';
                }
            } catch (error) {
                console.error('Lobby init error:', error);
                document.getElementById('lobbyParticipantText').textContent = 'Camera / mic unavailable';
            }
        }

        function toggleLobbyMic() {
            if (!localStream) return;
            micEnabled = !micEnabled;
            localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
            const btn = document.getElementById('lobbyMicBtn');
            btn.className = micEnabled ? 'ctrl-on' : 'ctrl-off';
            btn.textContent = micEnabled ? '🎤' : '🔇';
        }

        function toggleLobbyCam() {
            if (!localStream) return;
            camEnabled = !camEnabled;
            localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
            const btn = document.getElementById('lobbyCamBtn');
            btn.className = camEnabled ? 'ctrl-on' : 'ctrl-off';
            btn.textContent = camEnabled ? '📷' : '🚫';

            document.getElementById('lobbyVideo').style.display = camEnabled ? '' : 'none';
            document.getElementById('camOffPlaceholder').classList.toggle('hidden', camEnabled);
        }

        // ============ JOIN CALL ============
        async function joinCall() {
            // Hide lobby, show meeting
            document.getElementById('lobbyOverlay').classList.add('hidden');

            // Sync in-call buttons with lobby state
            syncCallControls();

            try {
                // Register join in DB (works for scheduled meetings, ignored for disposable)
                try {
                    await fetch(`/api/meetings/${room}/join`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                } catch (e) { /* disposable meeting — no DB record */ }

                // Assign stream to local video
                localVideo.srcObject = localStream;

                // Join socket room
                socket.emit('join-room', room, currentUser.id, currentUser.name);

                // Load persisted chat messages
                try { await loadChatMessages(); } catch (e) { /* no persisted messages */ }
            } catch (error) {
                console.error('Error joining call:', error);
            }
        }

        // ============ IN-CALL CONTROLS ============
        function syncCallControls() {
            const micBtn = document.getElementById('callMicBtn');
            const camBtn = document.getElementById('callCamBtn');
            micBtn.className = micEnabled ? 'ctrl-on' : 'ctrl-off';
            micBtn.textContent = micEnabled ? '🎤' : '🔇';
            camBtn.className = camEnabled ? 'ctrl-on' : 'ctrl-off';
            camBtn.textContent = camEnabled ? '📷' : '🚫';
        }

        function toggleCallMic() {
            if (!localStream) return;
            micEnabled = !micEnabled;
            localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
            syncCallControls();
        }

        function toggleCallCam() {
            if (!localStream) return;
            camEnabled = !camEnabled;
            localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
            syncCallControls();
        }

        // ============ WEBRTC ============
        socket.on("user-joined", async (id, name) => {
            console.log("User joined:", id, name);
            if (name) userNames[id] = name;
            const pc = createPeerConnection(id);
            peerConnections[id] = pc;
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            socket.emit("signal", {
                to: id,
                signal: offer
            });
        });

        socket.on("signal", async (data) => {
            let pc = peerConnections[data.from];
            
            if (!pc) {
                pc = createPeerConnection(data.from);
                peerConnections[data.from] = pc;
            }
            
            if (data.signal.type === 'offer') {
                await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);

                socket.emit("signal", {
                    to: data.from,
                    signal: answer
                });
            } else if (data.signal.type === 'answer') {
                await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
            } else if (data.signal.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
            }
        });

        socket.on("user-left", (id) => {
            if (peerConnections[id]) {
                peerConnections[id].close();
                delete peerConnections[id];
            }
            const videoElement = document.getElementById(`video-${id}`);
            if (videoElement) {
                videoElement.parentElement.remove();
            }
        });

        socket.on("receive-message", (data) => {
            addMessageToChat(data.userId || 'User', data.message);
        });

        function createPeerConnection(id) {
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' }
                ]
            });

            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
            });

            pc.ontrack = (event) => {
                console.log("Received remote track");
                addRemoteVideo(id, event.streams[0]);
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit("signal", {
                        to: id,
                        signal: {
                            candidate: event.candidate
                        }
                    });
                }
            };

            return pc;
        }

        function addRemoteVideo(id, stream) {
            if (!document.getElementById(`video-${id}`)) {
                const wrapper = document.createElement('div');
                wrapper.className = 'video-wrapper';
                wrapper.innerHTML = `
                    <video id="video-${id}" autoplay playsinline></video>
                    <div class="video-label">${userNames[id] || 'Remote User'}</div>
                `;
                videosContainer.appendChild(wrapper);
            }
            document.getElementById(`video-${id}`).srcObject = stream;
        }

        async function loadChatMessages() {
            try {
                const response = await fetch(`/api/meetings/${room}/messages`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const messages = await response.json();
                messages.forEach(msg => {
                    addMessageToChat(msg.name, msg.message);
                });
            } catch (err) {
                console.error('Error loading messages:', err);
            }
        }

        function addMessageToChat(user, message) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message';
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            msgDiv.innerHTML = `
                <div class="message-user">${user}</div>
                ${message}
                <div class="message-time">${time}</div>
            `;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;

            try {
                await fetch(`/api/meetings/${room}/messages`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ message })
                });

                socket.emit('send-message', { room, message });
                addMessageToChat('You', message);
                input.value = '';
            } catch (err) {
                console.error('Error sending message:', err);
            }
        }

        function handleChatKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function toggleChat() {
            document.getElementById('chatSection').classList.toggle('active');
        }

        function copyMeetingCode() {
            navigator.clipboard.writeText(room).then(() => {
                alert('Meeting code copied!');
            });
        }

        function leaveMeeting() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            Object.values(peerConnections).forEach(pc => pc.close());
            socket.disconnect();
            window.location.href = '/dashboard.html';
        }

        window.addEventListener('load', initLobby);
    </script>
</body>
</html>
